<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QQQ Debug</title>
  <style>
    body { font-family: system-ui, sans-serif; background:#111; color:#eee; padding:24px; }
    pre { white-space: pre-wrap; background:#1c1c1c; padding:16px; border-radius:12px; overflow:auto; }
    .ok { color:#8ef58e; }
    .bad { color:#ff8d8d; }
  </style>
</head>
<body>
  <h1>QQQ Debug</h1>
  <div id="status">Cargando...</div>
  <pre id="out"></pre>
  <script>
    const status = document.getElementById('status');
    const out = document.getElementById('out');

    fetch('./state.json?t=' + Date.now(), { cache: 'no-store' })
      .then(async r => {
        status.innerHTML = r.ok ? '<span class="ok">HTTP OK</span>' : '<span class="bad">HTTP ERROR</span>';
        const text = await r.text();
        out.textContent = text;
        try {
          const data = JSON.parse(text);
          status.innerHTML += '<br><span class="ok">JSON válido</span>';
          out.textContent = JSON.stringify({
            ticker: data.ticker,
            price: data.price,
            updatedAtNY: data.updatedAtNY,
            decisionLabel: data.decisionLabel,
            summary: data.summary
          }, null, 2);
        } catch (e) {
          status.innerHTML += '<br><span class="bad">JSON inválido</span>';
        }
      })
      .catch(err => {
        status.innerHTML = '<span class="bad">FETCH FALLÓ</span>';
        out.textContent = String(err);
      });
  </script>
</body>
</html>
