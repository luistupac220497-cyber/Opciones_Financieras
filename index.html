<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QQQ Dashboard</title>
  <style>
    :root {
      --bg: #0b1020;
      --card: #121933;
      --card-2: #1a2345;
      --text: #eef2ff;
      --muted: #a9b4d0;
      --accent: #6ea8fe;
      --border: rgba(255,255,255,.08);
      --good: #35c759;
      --bad: #ff6b6b;
      --flat: #f7c948;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background: linear-gradient(180deg, #0b1020 0%, #111833 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 32px;
    }

    p {
      margin: 0;
      color: var(--muted);
    }

    .hero {
      margin-top: 24px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
    }

    .top-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
    }

    .price {
      font-size: 54px;
      font-weight: 800;
      margin: 12px 0 4px;
    }

    .price.up { color: var(--good); }
    .price.down { color: var(--bad); }
    .price.flat { color: var(--flat); }

    .change {
      font-size: 18px;
      font-weight: 700;
      margin-top: 6px;
    }

    .change.up { color: var(--good); }
    .change.down { color: var(--bad); }
    .change.flat { color: var(--flat); }

    .status {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--card-2);
      color: var(--accent);
      font-size: 13px;
      font-weight: 600;
    }

    .meta {
      display: grid;
      gap: 10px;
      margin-top: 18px;
      color: var(--muted);
      font-size: 15px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
      grid-column: span 12;
    }

    .card.half {
      grid-column: span 6;
    }

    .card h2 {
      margin: 0 0 14px;
      font-size: 18px;
    }

    .kv {
      display: grid;
      gap: 12px;
    }

    .kv-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    .kv-row:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .kv-row span:first-child {
      color: var(--muted);
    }

    .kv-row span:last-child {
      font-weight: 700;
      text-align: right;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      text-align: left;
      padding: 12px 10px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }

    th {
      color: var(--muted);
      font-weight: 600;
    }

    .error {
      color: var(--bad);
      margin-top: 12px;
      white-space: pre-wrap;
    }

    @media (max-width: 900px) {
      .card.half { grid-column: span 12; }
    }

    @media (max-width: 640px) {
      .wrap { padding: 16px; }
      .price { font-size: 40px; }
      h1 { font-size: 26px; }
      th, td { font-size: 13px; padding: 10px 8px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>QQQ Dashboard</h1>
      <p>Precio, cambio diario y snapshot inicial del bear call spread.</p>
    </header>

    <section class="hero">
      <div class="top-row">
        <div>
          <div class="status" id="status">Cargando datos...</div>
          <div class="price" id="price">--</div>
          <div class="change" id="change">--</div>
        </div>
        <div class="meta">
          <div><strong>Ticker:</strong> <span id="ticker">--</span></div>
          <div><strong>Hora actualización:</strong> <span id="updatedAt">--</span></div>
          <div><strong>Fuente:</strong> <span id="source">--</span></div>
          <div><strong>Cierre previo:</strong> <span id="prevClose">--</span></div>
        </div>
      </div>
      <div class="error" id="error"></div>
    </section>

    <section class="grid">
      <article class="card half">
        <h2>Trade setup</h2>
        <div class="kv" id="tradeBox"></div>
      </article>

      <article class="card half">
        <h2>Options snapshot</h2>
        <div class="kv" id="optionsBox"></div>
      </article>

      <article class="card">
        <h2>Últimas actualizaciones</h2>
        <table>
          <thead>
            <tr>
              <th>Hora</th>
              <th>Ticker</th>
              <th>Precio</th>
              <th>Cambio %</th>
              <th>Fuente</th>
            </tr>
          </thead>
          <tbody id="historyTable">
            <tr><td colspan="5">Cargando histórico...</td></tr>
          </tbody>
        </table>
      </article>
    </section>
  </div>

  <script>
    const REPO_NAME = 'Opciones_Financieras';
    const BASE_PATH = window.location.hostname.endsWith('github.io')
      ? `/${REPO_NAME}`
      : '';

    function money(v) {
      return v == null ? '--' : `$${Number(v).toFixed(2)}`;
    }

    function pct(v) {
      return v == null ? '--' : `${Number(v).toFixed(2)}%`;
    }

    async function loadState() {
      const res = await fetch(`${BASE_PATH}/data/state.json?t=${Date.now()}`, { cache: 'no-store' });
      if (!res.ok) throw new Error(`state.json HTTP ${res.status}`);
      return await res.json();
    }

    async function loadHistory() {
      const res = await fetch(`${BASE_PATH}/data/history.json?t=${Date.now()}`, { cache: 'no-store' });
      if (!res.ok) throw new Error(`history.json HTTP ${res.status}`);
      return await res.json();
    }

    function renderState(state) {
      document.getElementById('status').textContent = 'Datos cargados correctamente';
      document.getElementById('ticker').textContent = state.ticker ?? '--';
      document.getElementById('updatedAt').textContent = state.updatedAtText ?? state.updatedAt ?? '--';
      document.getElementById('source').textContent = state.source ?? '--';
      document.getElementById('prevClose').textContent = money(state.prevClose);

      const priceEl = document.getElementById('price');
      priceEl.textContent = money(state.price);
      priceEl.className = `price ${state.tone ?? 'flat'}`;

      const changeEl = document.getElementById('change');
      const changeText = state.change != null && state.changePct != null
        ? `${money(state.change)} (${pct(state.changePct)})`
        : '--';
      changeEl.textContent = changeText;
      changeEl.className = `change ${state.tone ?? 'flat'}`;

      const trade = state.trade ?? {};
      document.getElementById('tradeBox').innerHTML = `
        <div class="kv-row"><span>Buffer modelo</span><span>${pct(trade.bufferPct)}</span></div>
        <div class="kv-row"><span>Short strike</span><span>${trade.shortStrike ?? '--'}</span></div>
        <div class="kv-row"><span>Long strike</span><span>${trade.longStrike ?? '--'}</span></div>
        <div class="kv-row"><span>Break-even</span><span>${money(trade.breakeven)}</span></div>
        <div class="kv-row"><span>Credit objetivo</span><span>${money(trade.netCredit)}</span></div>
      `;

      const options = state.options ?? {};
      document.getElementById('optionsBox').innerHTML = `
        <div class="kv-row"><span>Expiración</span><span>${options.expiration ?? '--'}</span></div>
        <div class="kv-row"><span>Short call bid/ask</span><span>${money(options.shortCallBid)} / ${money(options.shortCallAsk)}</span></div>
        <div class="kv-row"><span>Long call bid/ask</span><span>${money(options.longCallBid)} / ${money(options.longCallAsk)}</span></div>
        <div class="kv-row"><span>Estado</span><span>${options.notes ?? '--'}</span></div>
      `;
    }

    function renderHistory(history) {
      const tbody = document.getElementById('historyTable');
      const rows = Array.isArray(history) ? history.slice().reverse().slice(0, 12) : [];

      if (!rows.length) {
        tbody.innerHTML = '<tr><td colspan="5">Sin histórico todavía.</td></tr>';
        return;
      }

      tbody.innerHTML = rows.map(row => `
        <tr>
          <td>${row.updatedAtText ?? row.updatedAt ?? '--'}</td>
          <td>${row.ticker ?? '--'}</td>
          <td>${money(row.price)}</td>
          <td>${pct(row.changePct)}</td>
          <td>${row.source ?? '--'}</td>
        </tr>
      `).join('');
    }

    async function init() {
      const errorEl = document.getElementById('error');
      errorEl.textContent = '';

      try {
        const [state, history] = await Promise.all([loadState(), loadHistory()]);
        renderState(state);
        renderHistory(history);
      } catch (err) {
        document.getElementById('status').textContent = 'Error cargando datos';
        errorEl.textContent = err.message;
        console.error(err);
      }
    }

    init();
  </script>
</body>
</html>
