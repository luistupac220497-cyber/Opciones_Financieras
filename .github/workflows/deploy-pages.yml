name: Build and Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Verify site files
        run: |
          echo "=== ROOT ==="
          ls -la
          echo "=== DATA ==="
          ls -la data || true
          echo "=== INDEX HEAD ==="
          head -n 40 index.html || true
          echo "=== STATE HEAD ==="
          head -n 80 data/state.json || true

      - name: Prepare static site artifact
        run: |
          mkdir -p _site
          cp index.html _site/index.html
          mkdir -p _site/data
          cp data/state.json _site/data/state.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
