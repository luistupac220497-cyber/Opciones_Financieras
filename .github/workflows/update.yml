name: Build and Deploy Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests lxml html5lib beautifulsoup4
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Verify secret presence
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB }}
        run: |
          if [ -z "$FINNHUB_API_KEY" ]; then
            echo "ERROR: el secret FINNHUB no está configurado en GitHub Secrets"
            exit 1
          fi
          echo "Secret FINNHUB detectado"

      - name: Build data
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB }}
        run: |
          mkdir -p data
          python scripts/build_data.py

      - name: Verify generated files
        run: |
          if [ ! -f index.html ]; then
            echo "ERROR: falta index.html en la raíz del repo"
            exit 1
          fi

          if [ ! -f data/state.json ]; then
            echo "ERROR: falta data/state.json tras ejecutar build_data.py"
            exit 1
          fi

          echo "Contenido generado:"
          find data -maxdepth 3 -type f | sort
          echo "Preview state.json:"
          head -n 40 data/state.json || true

      - name: Prepare site
        run: |
          rm -rf _site
          mkdir -p _site

          cp index.html _site/index.html
          cp -r data _site/data

          if [ -f favicon.ico ]; then cp favicon.ico _site/favicon.ico; fi
          if [ -f CNAME ]; then cp CNAME _site/CNAME; fi
          if [ -f .nojekyll ]; then cp .nojekyll _site/.nojekyll; else touch _site/.nojekyll; fi

          echo "Archivos finales en _site:"
          find _site -maxdepth 4 -type f | sort

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
