name: Update QQQ Dashboard Data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * 1-5"

permissions:
  contents: write

jobs:
  build-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify FINNHUB_API_KEY
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB }}
        run: |
          python -c "import os; print('OK' if os.getenv('FINNHUB_API_KEY') else 'MISSING')"

      - name: Generate state.json
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB }}
        run: |
          python scripts/build_data.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/state.json
          git diff --cached --quiet || git commit -m "Update dashboard data"

      - name: Push changes
        run: git push
