name: Update QQQ Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * 1-5"

permissions:
  contents: write

jobs:
  build-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run dashboard script
        run: |
          python update_dashboard.py

      - name: Ensure files exist
        run: |
          test -f index.html
          test -f state.json
          test -f history.json

      - name: Debug generated files
        run: |
          echo "PWD:"
          pwd
          echo ""
          echo "FILES:"
          ls -la
          echo ""
          echo "STATE:"
          cat state.json || true
          echo ""
          echo "HISTORY HEAD:"
          head -n 40 history.json || true
          echo ""
          echo "GIT STATUS:"
          git status
          echo ""
          echo "GIT DIFF:"
          git diff -- index.html state.json history.json || true

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html state.json history.json qqq-spread-dashboard.html
          git diff --cached --stat
          git diff --cached --quiet || git commit -m "Update dashboard data"
          git push
