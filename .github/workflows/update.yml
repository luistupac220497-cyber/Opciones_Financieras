name: Update QQQ Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * 1-5"

concurrency:
  group: update-dashboard
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run dashboard builder
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB }}
        run: |
          python scripts/build_data.py

      - name: Verify generated files
        run: |
          ls -la
          ls -la data || true
          test -f data/state.json
          test -f data/history.json

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/state.json data/history.json
          git diff --staged --quiet || git commit -m "Auto-update dashboard data"

      - name: Push changes
        run: |
          git push
