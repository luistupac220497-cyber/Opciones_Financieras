name: Update QQQ Dashboard

on:
  schedule:
    - cron: "*/10 * * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate data files
        run: |
          python scripts/build_data.py

      - name: Debug generated files
        run: |
          echo "PWD:"
          pwd
          echo "ROOT:"
          ls -la
          echo "DATA:"
          ls -la data || true
          echo "STATE HEAD:"
          head -n 80 data/state.json || true
          echo "HISTORY HEAD:"
          head -n 80 data/history.json || true

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/state.json data/history.json
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "Update dashboard data"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
