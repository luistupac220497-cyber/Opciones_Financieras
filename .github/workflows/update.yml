name: Update QQQ Dashboard Data

on:
  workflow_dispatch:
  schedule:
    - cron: "10 * * * 1-5"

permissions:
  contents: write

jobs:
  build-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify FINNHUB_API_KEY
        run: python -c "import os; print('OK' if os.getenv('FINNHUB_API_KEY') else 'MISSING')"
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB }}

      - name: Show file before build
        run: |
          echo "===== BEFORE ====="
          test -f data/state.json && cat data/state.json || echo "data/state.json no existe"

      - name: Run builder
        run: python scripts/build_data.py
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB }}

      - name: Show file after build
        run: |
          echo "===== AFTER ====="
          cat data/state.json

      - name: Print key fields
        run: |
          python - <<'PY'
          import json
          with open("data/state.json", "r", encoding="utf-8") as f:
              s = json.load(f)
          print("updatedAt:", s.get("updatedAt"))
          print("price:", s.get("price"))
          print("change:", s.get("change"))
          print("changePct:", s.get("changePct"))
          print("prevClose:", s.get("prevClose"))
          print("session:", s.get("session", {}).get("code"))
          print("snapshotLabel:", s.get("dataHealth", {}).get("snapshotLabel"))
          print("freshnessLabel:", s.get("dataHealth", {}).get("freshnessLabel"))
          print("optionsStatus:", s.get("dataHealth", {}).get("optionsDataStatus"))
          print("decision:", s.get("decisionLabel"))
          print("score:", s.get("score"))
          PY

      - name: Check git diff
        id: verify_diff
        run: |
          git status
          git diff -- data/state.json || true
          git diff --quiet data/state.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit updated data
        if: steps.verify_diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/state.json
          git commit -m "Update dashboard data"
          git push

      - name: No changes detected
        if: steps.verify_diff.outputs.changed != 'true'
        run: echo "No hubo cambios reales en data/state.json"
