<script>
  const BASE_PATH = window.location.pathname.includes('/Opciones_Financieras/')
    ? '/Opciones_Financieras'
    : '';

  async function loadState() {
    const res = await fetch(`${BASE_PATH}/data/state.json?t=${Date.now()}`, { cache: 'no-store' });
    if (!res.ok) throw new Error(`state.json HTTP ${res.status}`);
    return await res.json();
  }

  async function loadHistory() {
    const res = await fetch(`${BASE_PATH}/data/history.json?t=${Date.now()}`, { cache: 'no-store' });
    if (!res.ok) throw new Error(`history.json HTTP ${res.status}`);
    return await res.json();
  }

  function renderState(state) {
    document.getElementById('status').textContent = 'Datos cargados correctamente';
    document.getElementById('ticker').textContent = state.ticker ?? '--';
    document.getElementById('price').textContent = state.price != null ? `$${Number(state.price).toFixed(2)}` : '--';
    document.getElementById('updatedAt').textContent = state.updatedAtText ?? state.updatedAt ?? '--';
    document.getElementById('source').textContent = state.source ?? '--';
  }

  function renderHistory(history) {
    const tbody = document.getElementById('historyTable');
    const rows = Array.isArray(history) ? history.slice().reverse().slice(0, 10) : [];

    if (!rows.length) {
      tbody.innerHTML = '<tr><td colspan="4">Sin histórico todavía.</td></tr>';
      return;
    }

    tbody.innerHTML = rows.map(row => `
      <tr>
        <td>${row.updatedAtText ?? row.updatedAt ?? '--'}</td>
        <td>${row.ticker ?? '--'}</td>
        <td>${row.price != null ? '$' + Number(row.price).toFixed(2) : '--'}</td>
        <td>${row.source ?? '--'}</td>
      </tr>
    `).join('');
  }

  async function init() {
    const errorEl = document.getElementById('error');
    errorEl.textContent = '';

    try {
      const [state, history] = await Promise.all([loadState(), loadHistory()]);
      renderState(state);
      renderHistory(history);
    } catch (err) {
      document.getElementById('status').textContent = 'Error cargando datos';
      errorEl.textContent = err.message;
      console.error(err);
    }
  }

  init();
</script>
